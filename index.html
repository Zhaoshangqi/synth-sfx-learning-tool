<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>合成器音效学习工具</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=20260708-flow-ribbons" />
    <link rel="stylesheet" href="./styles-reference.css?v=20260708-flow-ribbons" />
    <link rel="prefetch" href="./vendor/tone/Tone.js" as="script" />
  </head>
  <body>
    <div class="visual-splash" aria-hidden="true">
      <div class="visual-splash-row visual-splash-row-top">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="visual-splash-row visual-splash-row-bottom">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
    <div class="audio-space" aria-hidden="true">
      <canvas id="particle-canvas"></canvas>
      <div class="space-glow glow-a"></div>
      <div class="space-glow glow-b"></div>
      <div class="signal-field">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="space-noise"></div>
    </div>
    <div class="visual-spotlight" aria-hidden="true"></div>
    <a class="skip-link" href="#app">跳到内容</a>
    <div class="visual-logo-wrapper" aria-hidden="true">
      <div class="visual-logo-mark">SFX</div>
      <span>合成器音效学习工具</span>
    </div>
    <div class="visual-burger-wrapper">
      <button class="visual-burger-btn" type="button" aria-label="打开导航菜单" aria-controls="site-menu" aria-expanded="false">
        <span></span>
        <span></span>
      </button>
    </div>
    <aside class="sidebar" id="site-menu">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">SFX</span>
        <div>
          <h1>合成器音效学习工具</h1>
          <p>v2.0 工作台</p>
        </div>
      </div>
      <nav class="tabs" aria-label="主导航">
        <section class="nav-section" aria-label="主工作流" data-nav-group="workflow">
          <span class="nav-section-label">主工作流</span>
          <button class="tab is-active" type="button" data-view="dashboard" data-priority="primary"><span class="nav-index" aria-hidden="true">01</span><span class="nav-label">总览</span></button>
          <button class="tab" type="button" data-view="soundlab" data-priority="primary"><span class="nav-index" aria-hidden="true">02</span><span class="nav-label">Sound Lab</span></button>
          <button class="tab" type="button" data-view="daily" data-priority="primary"><span class="nav-index" aria-hidden="true">03</span><span class="nav-label">每日新教程</span></button>
          <button class="tab" type="button" data-view="sources" data-priority="primary"><span class="nav-index" aria-hidden="true">04</span><span class="nav-label">资料检索</span></button>
        </section>
        <section class="nav-section" aria-label="学习线路" data-nav-group="learning">
          <span class="nav-section-label">学习线路</span>
          <button class="tab" type="button" data-view="micro" data-priority="secondary"><span class="nav-index" aria-hidden="true">05</span><span class="nav-label">微课路线</span></button>
          <button class="tab" type="button" data-view="interactive" data-priority="secondary"><span class="nav-index" aria-hidden="true">06</span><span class="nav-label">互动课程</span></button>
          <button class="tab" type="button" data-view="cards" data-priority="secondary"><span class="nav-index" aria-hidden="true">07</span><span class="nav-label">知识卡片</span></button>
          <button class="tab" type="button" data-view="diagrams" data-priority="secondary"><span class="nav-index" aria-hidden="true">08</span><span class="nav-label">原理图</span></button>
        </section>
        <section class="nav-section" aria-label="制作与交付" data-nav-group="delivery">
          <span class="nav-section-label">制作与交付</span>
          <button class="tab" type="button" data-view="challenges" data-priority="secondary"><span class="nav-index" aria-hidden="true">09</span><span class="nav-label">声音挑战</span></button>
          <button class="tab" type="button" data-view="techniques" data-priority="secondary"><span class="nav-index" aria-hidden="true">10</span><span class="nav-label">技巧库</span></button>
          <button class="tab" type="button" data-view="community" data-priority="secondary"><span class="nav-index" aria-hidden="true">11</span><span class="nav-label">博主技巧</span></button>
          <button class="tab" type="button" data-view="deep" data-priority="secondary"><span class="nav-index" aria-hidden="true">12</span><span class="nav-label">深度解析</span></button>
          <button class="tab" type="button" data-view="recipes" data-priority="secondary"><span class="nav-index" aria-hidden="true">13</span><span class="nav-label">音效配方</span></button>
          <button class="tab" type="button" data-view="practice" data-priority="secondary"><span class="nav-index" aria-hidden="true">14</span><span class="nav-label">REAPER 练习</span></button>
          <button class="tab" type="button" data-view="integrations" data-priority="secondary"><span class="nav-index" aria-hidden="true">15</span><span class="nav-label">外部集成</span></button>
        </section>
      </nav>
      <section class="sidebar-progress-card" aria-label="学习进度">
        <div class="user-avatar">Z</div>
        <div>
          <strong>Zhaoshangqi</strong>
          <span>学习进度 62%</span>
        </div>
        <i aria-hidden="true"></i>
      </section>
      <section class="daily-suggestion-card" aria-label="今日学习建议">
        <span>今日学习建议</span>
        <strong>继续学习：金属音色 · FM 与频谱</strong>
        <small>实验进度 2/5</small>
        <button type="button" data-view="soundlab">继续实验</button>
      </section>
    </aside>
    <main class="workspace">
      <section class="toolbar" aria-label="筛选">
        <label class="field field-wide" for="query">
          <span>搜索</span>
          <input id="query" type="search" placeholder="金属、FM、Serum、whoosh..." />
        </label>
        <label class="field" for="synth-filter">
          <span>合成器</span>
          <select id="synth-filter">
            <option value="all">全部</option>
            <option value="Serum">Serum</option>
            <option value="Phase Plant">Phase Plant</option>
            <option value="Vital">Vital</option>
          </select>
        </label>
        <label class="field" for="difficulty-filter">
          <span>难度</span>
          <select id="difficulty-filter">
            <option value="all">全部</option>
            <option value="foundation">基础</option>
            <option value="beginner">初级</option>
            <option value="intermediate">中级</option>
            <option value="advanced">高级</option>
            <option value="creative">创意</option>
          </select>
        </label>
        <label class="field" for="tag-filter">
          <span>标签</span>
          <select id="tag-filter">
            <option value="all">全部</option>
          </select>
        </label>
        <button class="notification-button" type="button" aria-label="通知"><span>3</span></button>
      </section>
      <section id="app" class="content" aria-live="polite"></section>
    </main>
    <script type="module" src="./src/visual-space.js?v=20260708-flow-ribbons"></script>
    <script type="module" src="./src/interaction-effects.js"></script>
    <script type="module" src="./src/app.js?v=20260708-flow-ribbons"></script>
    <script type="module" src="./src/shell-visuals.js"></script>
  </body>
</html>
