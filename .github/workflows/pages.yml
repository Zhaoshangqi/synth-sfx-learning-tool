name: Publish static site to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify static app
        run: npm test

      - name: Publish branch artifact
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true
          rm -rf _gh_pages
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add _gh_pages origin/gh-pages
          else
            git worktree add --detach _gh_pages
            cd _gh_pages
            git checkout --orphan gh-pages
            cd ..
          fi

          find _gh_pages -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp index.html styles.css styles-reference.css package.json README.md _gh_pages/
          for dir in src tests docs vendor data; do
            if [ -d "$dir" ]; then
              cp -r "$dir" _gh_pages/
            fi
          done
          touch _gh_pages/.nojekyll

          cd _gh_pages
          git add -A
          if git diff --cached --quiet; then
            echo "No gh-pages changes."
          else
            git commit -m "Deploy static site"
            git push origin HEAD:gh-pages
          fi
